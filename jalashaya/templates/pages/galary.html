{% extends 'layouts/base.html' %}
{% load static %}
{% block title %}Gallery | Jalashaya{% endblock title %}
{% block content %}
<section class="page-hero reveal-up">
  <div class="container py-5 text-white text-center">
    <span class="badge hero-badge mb-3">Visual Gallery</span>
    <h1 class="display-6 fw-bold">Hydration in Action</h1>
    <p class="text-white-50 mb-0">A quick look at Jalashaya quality, packaging and delivery moments.</p>
  </div>
</section>

<section class="container py-5">
  <div class="row g-4">
    <div class="col-md-4 reveal-up"><div class="gallery-card"><img src="{% static 'images/logo.jpeg' %}" alt="Jalashaya brand image"></div></div>
    <div class="col-md-4 reveal-up"><div class="gallery-card"><img src="{% static 'images/logos.jpeg' %}" alt="Jalashaya bottle branding"></div></div>
    <div class="col-md-4 reveal-up"><div class="gallery-card"><img src="{% static 'images/logo.jpeg' %}" alt="Jalashaya quality visual"></div></div>
  </div>
</section>
{% endblock content %}
